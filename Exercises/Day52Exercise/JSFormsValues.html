<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
        function showData() {
            let title = document.getElementsByName('title');
            for (let index = 0; index < title.length; index++) {
                if (title[index].checked)
                    console.log(title[index].value);
            }

            let name = document.getElementById('ename').value;
            console.log(name);

            let occupation = document.getElementById('occupation').value;
            console.log(occupation);

            let mobile = document.getElementById('number').value;
            console.log(mobile);

            let gender = document.getElementsByName('gender');
            for (let index = 0; index < gender.length; index++) {
                if (gender[index].checked)
                    console.log(gender[index].value);
            }

            let age = document.getElementById('age');
            console.log(age.value);

            let accType = document.getElementsByName('type');
            for (let index = 0; index < accType.length; index++) {
                if (accType[index].checked)
                    console.log(accType[index].value);
            }

            let dob = document.getElementById('dob').value;
            console.log(dob);

            let pan = document.getElementById('PAN').value;
            console.log(pan);
        }

    </script>
</head>

<body>
    <h2>Account Opening Form</h2>
    <form onsubmit="
        showData();
        return false;
      ">
        <table>
            <tr>
                <td>Select</td>
                <td>
                    <input type="radio" name="title" id="Miss" value="Miss" />
                    <label for="Miss">Miss</label>
                    <input type="radio" name="title" id="Mr" value="Mr" /><label for="Mr">Mr.</label>
                    <input type="radio" name="title" id="Mrs" value="Mrs" /><label for="Mrs">Mrs.</label>
                </td>
            </tr>

            <tr>
                <td>Enter your Name</td>
                <td>
                    <input type="text" placeholder="Enter your name" name="ename" id="ename" />
                </td>
            </tr>
            <tr>
                <td>Occupation</td>
                <td>
                    <input type="text" name="occupation" id="occupation" />
                </td>
            </tr>
            <tr>
                <td>Mobile number</td>
                <td>
                    <input type="text" placeholder="1234567890" id="number" name="number" />
                </td>
            </tr>
            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" name="gender" id="male" value="M" /><label for="male">Male</label>
                    <input type="radio" name="gender" id="female" value="F" /><label for="female">Female</label>
                </td>
            </tr>
            <tr>
                <td>Enter your Age</td>
                <td>
                    <input type="number" name="age" id="age" min="15" max="45" />
                </td>
            </tr>
            <tr>
                <td>Account Type</td>
                <td>
                    <select name="type" id="type">
                        <option value="">Select</option>
                        <option value="1">Saving</option>
                        <option value="2">Current</option>
                        <option value="3">Fixed Deposit</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Enter your DOB</td>
                <td>
                    <input type="date" name="dob" id="dob" max="2026-03-03" />
                </td>
            </tr>
            <tr>
                <td>Enter your PAN</td>
                <td>
                    <input type="text" placeholder="ABCDE1234E" name="PAN" id="PAN"
                        pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}" />
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <input type="checkbox" name="confirm" id="confirm" />I confirm that
                    the above details provided are correct.
                </td>
            </tr>
            <tr>
                <td>
                    <input type="submit" value="Submit" />
                    <input type="reset" />
                </td>
            </tr>
        </table>
    </form>
</body>

</html>
